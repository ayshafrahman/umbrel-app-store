version: "3.7"

services:
  vpn:
    image: qmcgaw/gluetun:latest
    container_name: vpn
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=private internet access
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${PIA_USER}   # References the .env file
      - OPENVPN_PASSWORD=${PIA_PASS} # References the .env file
      - SERVER_REGIONS=Auto
    ports:
      - 9091:9091
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

  transmission:
    image: linuxserver/transmission:latest
    container_name: transmission
    network_mode: "service:vpn"
    depends_on:
      - vpn
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - USER=umbrel
      - PASS=${TRANSMISSION_PASS} # References the .env file
    volumes:
      - ${UMBREL_ROOT}/data/app-data/transmission-config:/config
      - ${UMBREL_ROOT}/data/storage/downloads:/downloads
      - ${UMBREL_ROOT}/data/storage/watch:/watch
    restart: unless-stopped